<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de hospital</title>
    <script src="./script.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div 

        <div class="columns">


            <div class="centro muitoAlto column is-9" id="pacienteAtual">

                <h1 class="title is-3 centro">Próximo da fila: </h1>
                <h1 class="title is-1 centro" id="proximoFila"></h1>
                <h1 class="title is-1 centro" id="txtUrgente"></h1>
    
            </div>

            <div class="centro muitoAlto column is-3" id="consultorioMedico">

                <h1 class="title is-3 centro">Consultório: </h1>
                <h1 class="title is-1 centro" id="proximoConsultorio"></h1>
                <h1 class="title is-2 centro" id="txtEspecialidade"></h1>

            </div>

        </div>

        <hr>

        <div class="centro alto" id="proximosPacientes">

            <h1 class="centro title is-3">Nomes na fila: </h1>
            <h1 class="centro title is-1" id="filaPacientes"></h1>

        </div>

        <hr>


    </div>

    <div id="botoesControle" class="centro muitoAlto">

        <button onclick="cadastroPaciente()" class="button is-info is-large">Cadastrar paciente</button>
        <a href="./projFarmacia/index.html" target="_blank"><button class="button is-link is-large">Controle de medicamento</button></a>

        <br><br>


        <button class="button is-warning"onclick="inicializaSala1()">Inicializa Sala 1</button>
        <button class="button is-warning"onclick="inicializaSala2()">Inicializa Sala 2</button>
        <button class="button is-warning"onclick="inicializaSala3()">Inicializa Sala 3</button>
        <button class="button is-warning"onclick="inicializaSala4()">Inicializa Sala 4</button>


        <br><br>

        <button class="button is-secondary" onclick="chamaSala1()">Chamar na Sala 1</button>
        <button class="button is-secondary" onclick="chamaSala2()">Chamar na Sala 2</button>
        <button class="button is-secondary" onclick="chamaSala3()">Chamar na Sala 3</button>
        <button class="button is-secondary" onclick="chamaSala4()">Chamar na Sala 4</button>


    </div>    



</body>

</html>
